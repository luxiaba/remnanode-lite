syntax = "proto3";

package remnanode.xtls.wire;

option go_package = "github.com/luxiaba/remnanode-lite/internal/xrayrpc/wire";

// These messages intentionally contain only fields used by the Node. Their
// field numbers and wire types match rw-core, while RPC method paths and
// TypedMessage type names remain explicit constants in the calling package.

message Empty {}

message TypedMessage {
  string type = 1;
  bytes value = 2;
}

message User {
  uint32 level = 1;
  string email = 2;
  TypedMessage account = 3;
}

message VlessAccount {
  string id = 1;
  string flow = 2;
  string encryption = 3;
}

message TrojanAccount {
  string password = 1;
}

message ShadowsocksAccount {
  string password = 1;
  int32 cipher_type = 2;
  bool iv_check = 3;
}

message Shadowsocks2022Account {
  string key = 1;
}

message HysteriaAccount {
  string auth = 1;
}

message AddUserOperation {
  User user = 1;
}

message RemoveUserOperation {
  string email = 1;
}

message AlterInboundRequest {
  string tag = 1;
  TypedMessage operation = 2;
}

message GetInboundUserRequest {
  string tag = 1;
  string email = 2;
}

message GetInboundUserResponse {
  repeated User users = 1;
}

message GetInboundUsersCountResponse {
  int64 count = 1;
}

message RemoveOutboundRequest {
  string tag = 1;
}

message GetStatsRequest {
  string name = 1;
  bool reset = 2;
}

message Stat {
  string name = 1;
  int64 value = 2;
}

message GetStatsResponse {
  Stat stat = 1;
}

message QueryStatsRequest {
  string pattern = 1;
  bool reset = 2;
}

message QueryStatsResponse {
  repeated Stat stat = 1;
}

message SysStatsResponse {
  uint32 num_goroutine = 1;
  uint32 num_gc = 2;
  uint64 alloc = 3;
  uint64 total_alloc = 4;
  uint64 sys = 5;
  uint64 mallocs = 6;
  uint64 frees = 7;
  uint64 live_objects = 8;
  uint64 pause_total_ns = 9;
  uint32 uptime = 10;
}

message GetStatsOnlineIpListResponse {
  string name = 1;
  map<string, int64> ips = 2;
}

message GetAllOnlineUsersResponse {
  repeated string users = 1;
}

// GetUsersStats is an rw-core extension used by @remnawave/xtls-sdk 0.16.0.
message OnlineIPEntry {
  string ip = 1;
  int64 last_seen = 2;
}

message TrafficUserStat {
  int64 uplink = 1;
  int64 downlink = 2;
}

message UserStat {
  string email = 1;
  repeated OnlineIPEntry ips = 2;
  TrafficUserStat traffic = 3;
}

message GetUsersStatsRequest {
  bool include_traffic = 1;
  bool reset = 2;
}

message GetUsersStatsResponse {
  repeated UserStat users = 1;
}
