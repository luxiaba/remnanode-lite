# Managed as 20-remnanode-lite-hardening.conf under the unit's /etc drop-in
# directory. Site-specific overrides may follow in 90-local.conf.
[Service]
# These directives require systemd 240 through 247. Install this drop-in only
# after confirming the host supports all of them; the base unit stays valid on
# Rocky 8's maintained systemd 239 package.
LogRateLimitIntervalSec=30s
LogRateLimitBurst=200
RestrictSUIDSGID=true
ProtectKernelLogs=true
ProtectClock=true
ProtectHostname=true
ProtectProc=invisible
