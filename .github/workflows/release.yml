name: release

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: luxiaba/remnanode-lite

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Publish a new release or reconcile an already published channel
        required: true
        default: publish
        type: choice
        options:
          - publish
          - reconcile
      version:
        description: Exact X.Y.Z[-rnl.N] version to publish from current main
        required: false
        type: string
      release_tag:
        description: Published vX.Y.Z[-rnl.N] tag whose GHCR channel should be reconciled
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare-release:
    if: inputs.operation == 'publish'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      candidate_digest: ${{ steps.accepted-image.outputs.digest }}
      channel: ${{ steps.release-metadata.outputs.channel }}
      make_latest: ${{ steps.release-metadata.outputs.make_latest }}
      prerelease: ${{ steps.release-metadata.outputs.prerelease }}
      release_id: ${{ steps.draft-release.outputs.id }}
      release_tag: ${{ steps.release-input.outputs.tag }}
      version: ${{ steps.release-metadata.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release request
        id: release-input
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [ "$GITHUB_REF" = refs/heads/main ] || {
            echo "manual publication must be run from refs/heads/main, got $GITHUB_REF" >&2
            exit 1
          }
          version="${VERSION_INPUT:-}"
          printf '%s\n' "$version" | grep -Eq \
            '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-rnl\.[1-9][0-9]*)?$' || {
            echo "version must use X.Y.Z or X.Y.Z-rnl.N" >&2
            exit 2
          }
          tag="v${version}"
          bash scripts/release-metadata.sh "$tag" >/tmp/release-metadata
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"
          cat /tmp/release-metadata >>"$GITHUB_OUTPUT"
          cat /tmp/release-metadata

      - name: Verify release commit is the current main head
        run: |
          set -euo pipefail
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          main_head="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$main_head" ]; then
            echo "release commit $GITHUB_SHA is not current origin/main head $main_head" >&2
            exit 1
          fi

      - name: Create annotated release tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-input.outputs.tag }}
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            bash scripts/verify-release-tag.sh "$RELEASE_TAG" "$GITHUB_SHA"
            echo "release tag ${RELEASE_TAG} already exists at $GITHUB_SHA"
            exit 0
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "release ${RELEASE_TAG} already exists" >&2
            exit 1
          fi
          tag_sha="$(gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/tags" \
            -f tag="$RELEASE_TAG" \
            -f message="Remnanode Lite ${RELEASE_TAG#v}" \
            -f object="$GITHUB_SHA" \
            -f type=commit \
            --jq .sha)"
          printf '%s\n' "$tag_sha" | grep -Eq '^[0-9a-f]{40}$' || {
            echo "GitHub returned an invalid tag object sha: ${tag_sha:-<empty>}" >&2
            exit 1
          }
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${RELEASE_TAG}" \
            -f sha="$tag_sha" >/dev/null

      - name: Verify the remote annotated tag is unchanged
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-input.outputs.tag }}
        run: bash scripts/verify-release-tag.sh "$RELEASE_TAG" "$GITHUB_SHA"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: remnawave/node
          ref: 596f015a5c8f876dc9a9d61b6cb78d35bd8e379b
          path: .official-source
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"

      - name: Install pinned static checks
        run: bash scripts/install-ci-checks.sh

      - name: Release preflight
        env:
          RELEASE_TAG: ${{ steps.release-input.outputs.tag }}
          REQUIRE_GOVULNCHECK: "1"
          REQUIRE_TAG_AT_HEAD: "1"
          REMNANODE_OFFICIAL_SOURCE: ${{ github.workspace }}/.official-source
        run: bash scripts/release-check.sh

      - name: Classify release
        id: release-metadata
        env:
          RELEASE_TAG: ${{ steps.release-input.outputs.tag }}
        run: bash scripts/release-metadata.sh "$RELEASE_TAG" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify main candidate image
        id: accepted-image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          candidate_commit="$GITHUB_SHA"
          candidate_tag="${REGISTRY}/${IMAGE_NAME}:sha-${candidate_commit}"
          candidate_digest=
          inspect_error="$(mktemp)"
          trap 'rm -f "$inspect_error"' EXIT
          for attempt in $(seq 1 30); do
            if candidate_digest="$(docker buildx imagetools inspect \
              --format '{{.Manifest.Digest}}' "$candidate_tag" \
              2>"$inspect_error" | tr -d '\r\n')"; then
              if printf '%s\n' "$candidate_digest" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
                break
              fi
              echo "candidate lookup returned an invalid digest for $candidate_tag: ${candidate_digest:-<empty>}" >&2
              exit 1
            fi
            if ! grep -Eqi 'not found|manifest unknown|name unknown|404' "$inspect_error"; then
              cat "$inspect_error" >&2
              echo "could not inspect main candidate $candidate_tag" >&2
              exit 1
            fi
            if [ "$attempt" -lt 30 ]; then
              echo "waiting for attested main candidate $candidate_tag ($attempt/30)"
              sleep 20
            fi
          done
          printf '%s\n' "$candidate_digest" | grep -Eq '^sha256:[0-9a-f]{64}$' || {
            echo "attested main candidate did not become available: $candidate_tag" >&2
            exit 1
          }

          image="${REGISTRY}/${IMAGE_NAME}"
          candidate_ref="${image}@${candidate_digest}"
          resolved="$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "$candidate_ref" | tr -d '\r\n')"
          if [ "$resolved" != "$candidate_digest" ]; then
            echo "$candidate_ref resolved to $resolved, expected $candidate_digest" >&2
            exit 1
          fi

          index_json="$(docker buildx imagetools inspect --raw "$candidate_ref")"
          if ! jq -e '
            def reference_type:
              (.annotations["vnd.docker.reference.type"] // "");
            . as $index
            | [.manifests[]? | select(reference_type == "")] as $runnable
            | [
                .manifests[]?
                | select(reference_type == "attestation-manifest")
              ] as $attestations
            | ($index.schemaVersion == 2)
              and ($index.mediaType == "application/vnd.oci.image.index.v1+json"
                or $index.mediaType == "application/vnd.docker.distribution.manifest.list.v2+json")
              and (($index.manifests | type) == "array")
              and (($index.manifests | length) == 4)
              and (($runnable | length) == 2)
              and (($attestations | length) == 2)
              and (($index.manifests | length) == (($runnable | length) + ($attestations | length)))
              and (([$runnable[] | "\(.platform.os // "")/\(.platform.architecture // "")"] | sort)
                == ["linux/amd64", "linux/arm64"])
              and (([$runnable[].digest] | length) == ([$runnable[].digest] | unique | length))
              and (all($runnable[];
                (.digest | test("^sha256:[0-9a-f]{64}$"))
                and (.size > 0)
                and (.mediaType == "application/vnd.oci.image.manifest.v1+json"
                  or .mediaType == "application/vnd.docker.distribution.manifest.v2+json")))
              and (all($attestations[];
                (.digest | test("^sha256:[0-9a-f]{64}$"))
                and (.size > 0)
                and (.mediaType == "application/vnd.oci.image.manifest.v1+json")
                and (.platform.os == "unknown")
                and (.platform.architecture == "unknown")
                and (.annotations["vnd.docker.reference.digest"] | test("^sha256:[0-9a-f]{64}$"))))
              and (([$attestations[].annotations["vnd.docker.reference.digest"]] | sort)
                == ([$runnable[].digest] | sort))
          ' >/dev/null <<<"$index_json"; then
            echo "$candidate_ref does not contain exactly two runnable platform manifests with their attestations" >&2
            jq '{schemaVersion, mediaType, manifests}' <<<"$index_json" >&2
            exit 1
          fi

          attestation_verified=false
          for attempt in $(seq 1 12); do
            if gh attestation verify "oci://${image}@${candidate_digest}" \
              --repo "$GITHUB_REPOSITORY" \
              --cert-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/container.yml@refs/heads/main" \
              --source-digest "$candidate_commit" \
              --deny-self-hosted-runners; then
              attestation_verified=true
              break
            fi
            echo "waiting for candidate attestation visibility ($attempt/12)"
            sleep 10
          done
          [ "$attestation_verified" = true ] || {
            echo "candidate attestation did not become verifiable" >&2
            exit 1
          }

          printf 'digest=%s\n' "$candidate_digest" >>"$GITHUB_OUTPUT"

      - name: Network administration integration in isolated namespaces
        run: |
          sudo apt-get update
          sudo apt-get install --yes iproute2 nftables
          sudo env "PATH=$PATH" REMNANODE_NFT_INTEGRATION=1 \
            go test ./internal/plugin -run '^TestNFTManagerInNetworkNamespace$' -count=1 -v
          sudo env "PATH=$PATH" REMNANODE_SOCKET_KILL_INTEGRATION=1 \
            go test ./internal/netadmin -run '^TestKillSocketsInNetworkNamespace$' -count=1 -v

      - name: Build and verify release assets
        env:
          RELEASE_VERSION: ${{ steps.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/native
          bash scripts/build-native-bundle.sh dist/native amd64 arm64

          contract_version="$(tr -d ' \n\r' < internal/version/contract.version)"
          for arch in amd64 arm64; do
            source="dist/native/remnanode-lite_${RELEASE_VERSION}_linux_${arch}.tar.gz"
            archive="dist/remnanode-lite_${RELEASE_VERSION}_linux_${arch}.tar.gz"
            mv "$source" "$archive"
            go run ./cmd/release-tool verify \
              --lock release/runtime-assets.lock.json \
              --archive "$archive" \
              --arch "$arch" \
              --version "$RELEASE_VERSION" \
              --contract-version "$contract_version" \
              --source-revision "$GITHUB_SHA"
            bash scripts/test-native-release-bundle.sh "$archive" "$arch"
          done
          rmdir dist/native

          install -m 0755 release/native/install.sh dist/install.sh
          install -m 0644 compose.yaml dist/compose.yaml
          sed \
            "s|ghcr.io/luxiaba/remnanode-lite:latest|ghcr.io/luxiaba/remnanode-lite:${RELEASE_VERSION}|" \
            deploy/compose.single-file.yaml >dist/docker-compose.single-file.yaml
          sed \
            "s|^REMNANODE_IMAGE=.*$|REMNANODE_IMAGE=ghcr.io/luxiaba/remnanode-lite:${RELEASE_VERSION}|" \
            .env.example >dist/remnanode-lite.env.example

          (
            cd dist
            sha256sum \
              install.sh \
              "remnanode-lite_${RELEASE_VERSION}_linux_amd64.tar.gz" \
              "remnanode-lite_${RELEASE_VERSION}_linux_arm64.tar.gz" \
              compose.yaml \
              docker-compose.single-file.yaml \
              remnanode-lite.env.example \
              >SHA256SUMS
            sha256sum --check --strict SHA256SUMS
          )

      - name: Attest every release asset
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*

      - name: Verify release asset provenance
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          for asset in dist/*; do
            [ -f "$asset" ] || continue
            gh attestation verify \
              "$asset" \
              --repo "$GITHUB_REPOSITORY" \
              --cert-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${RELEASE_WORKFLOW_REF}" \
              --source-digest "$GITHUB_SHA" \
              --deny-self-hosted-runners
          done

      - name: Reject an already-published release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-input.outputs.tag }}
        run: |
          set -euo pipefail
          releases="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" | jq -sc \
            --arg tag "$RELEASE_TAG" '[.[][] | select(.tag_name == $tag)]')"
          count="$(jq 'length' <<<"$releases")"
          if [ "$count" -gt 1 ]; then
            echo "multiple releases exist for $RELEASE_TAG" >&2
            exit 1
          fi
          if [ "$count" -eq 1 ]; then
            [ "$(jq -r '.[0].draft' <<<"$releases")" = true ] || {
              echo "$RELEASE_TAG is already published and cannot be replaced" >&2
              exit 1
            }
          fi

      - name: Reconfirm the remote tag before creating the draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-input.outputs.tag }}
        run: bash scripts/verify-release-tag.sh "$RELEASE_TAG" "$GITHUB_SHA"

      - name: Create draft release and upload every asset
        id: draft-release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          tag_name: ${{ steps.release-input.outputs.tag }}
          prerelease: ${{ steps.release-metadata.outputs.prerelease }}
          make_latest: false
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/install.sh
            dist/remnanode-lite_${{ steps.release-metadata.outputs.version }}_linux_amd64.tar.gz
            dist/remnanode-lite_${{ steps.release-metadata.outputs.version }}_linux_arm64.tar.gz
            dist/compose.yaml
            dist/docker-compose.single-file.yaml
            dist/remnanode-lite.env.example
            dist/SHA256SUMS

      - name: Verify the complete draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft-release.outputs.id }}
          RELEASE_TAG: ${{ steps.release-input.outputs.tag }}
        run: |
          set -euo pipefail
          printf '%s\n' "$RELEASE_ID" | grep -Eq '^[1-9][0-9]*$'
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")"
          [ "$(jq -r .draft <<<"$release")" = true ]
          [ "$(jq -r .tag_name <<<"$release")" = "$RELEASE_TAG" ]
          expected="$(
            for asset in dist/*; do
              [ -f "$asset" ] || continue
              digest="$(sha256sum "$asset" | awk '{print $1}')"
              size="$(wc -c <"$asset" | tr -d ' ')"
              printf '%s sha256:%s %s\n' "${asset##*/}" "$digest" "$size"
            done | sort
          )"
          actual="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?per_page=100" \
            --jq '.[] | [.name, .digest, (.size | tostring)] | join(" ")' | sort)"
          if [ "$actual" != "$expected" ]; then
            echo "draft release asset names, sizes, or digests do not match the build" >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") >&2 || true
            exit 1
          fi

  publish-container:
    needs: prepare-release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish the exact release image tag
        env:
          SOURCE_DIGEST: ${{ needs.prepare-release.outputs.candidate_digest }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          bash scripts/promote-image-tag.sh immutable \
            "${REGISTRY}/${IMAGE_NAME}" "$SOURCE_DIGEST" "$VERSION"

  finalize-release:
    needs: [prepare-release, publish-container]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify the remote tag before publishing the Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: bash scripts/verify-release-tag.sh "$RELEASE_TAG" "$GITHUB_SHA"

      - name: Publish the verified draft
        env:
          GH_TOKEN: ${{ github.token }}
          MAKE_LATEST: ${{ needs.prepare-release.outputs.make_latest }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")"
          [ "$(jq -r .tag_name <<<"$release")" = "$RELEASE_TAG" ]

          if [ "$(jq -r .draft <<<"$release")" = true ]; then
            published="$(gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
              -F draft=false \
              -F prerelease="$PRERELEASE" \
              -f make_latest="$MAKE_LATEST")"
          else
            published="$release"
          fi
          [ "$(jq -r .draft <<<"$published")" = false ]
          [ "$(jq -r .prerelease <<<"$published")" = "$PRERELEASE" ]

          bash scripts/verify-release-latest.sh "$RELEASE_TAG" "$MAKE_LATEST"

  promote-channel:
    needs: [prepare-release, publish-container, finalize-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reconfirm the published Release and exact image
        env:
          EXPECTED_PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          SOURCE_DIGEST: ${{ needs.prepare-release.outputs.candidate_digest }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          bash scripts/verify-release-tag.sh "$RELEASE_TAG" "$GITHUB_SHA"
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          [ "$(jq -r .draft <<<"$release")" = false ]
          [ "$(jq -r .prerelease <<<"$release")" = "$EXPECTED_PRERELEASE" ]
          image="${REGISTRY}/${IMAGE_NAME}"
          exact_digest="$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "${image}:${VERSION}" | tr -d '\r\n')"
          [ "$exact_digest" = "$SOURCE_DIGEST" ] || {
            echo "exact release image resolves to $exact_digest, expected $SOURCE_DIGEST" >&2
            exit 1
          }
          gh attestation verify "oci://${image}@${SOURCE_DIGEST}" \
            --repo "$GITHUB_REPOSITORY" \
            --cert-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/container.yml@refs/heads/main" \
            --source-digest "$GITHUB_SHA" \
            --deny-self-hosted-runners

      - name: Promote the published release channel without rebuilding
        env:
          CHANNEL: ${{ needs.prepare-release.outputs.channel }}
          SOURCE_DIGEST: ${{ needs.prepare-release.outputs.candidate_digest }}
        run: |
          set -euo pipefail
          bash scripts/promote-image-tag.sh mutable \
            "${REGISTRY}/${IMAGE_NAME}" "$SOURCE_DIGEST" "$CHANNEL"

  reconcile-channel:
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'reconcile'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/heads/main
          fetch-depth: 0
          persist-credentials: false

      - name: Classify published release
        id: release-metadata
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: bash scripts/release-metadata.sh "$RELEASE_TAG" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published release and exact image
        id: release-image
        env:
          EXPECTED_PRERELEASE: ${{ steps.release-metadata.outputs.prerelease }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          VERSION: ${{ steps.release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          bash scripts/verify-release-tag.sh "$RELEASE_TAG" "$(git rev-list -n 1 "$RELEASE_TAG")"
          release_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          [ "$(jq -r .draft <<<"$release")" = false ]
          [ "$(jq -r .prerelease <<<"$release")" = "$EXPECTED_PRERELEASE" ]

          image="${REGISTRY}/${IMAGE_NAME}"
          exact_digest="$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "${image}:${VERSION}" | tr -d '\r\n')"
          candidate_digest="$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "${image}:sha-${release_commit}" | tr -d '\r\n')"
          printf '%s\n' "$exact_digest" | grep -Eq '^sha256:[0-9a-f]{64}$'
          [ "$exact_digest" = "$candidate_digest" ] || {
            echo "exact release image does not match its accepted main candidate" >&2
            exit 1
          }
          gh attestation verify "oci://${image}@${exact_digest}" \
            --repo "$GITHUB_REPOSITORY" \
            --cert-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/container.yml@refs/heads/main" \
            --source-digest "$release_commit" \
            --deny-self-hosted-runners

          if [ "$EXPECTED_PRERELEASE" = true ]; then
            newest_preview="$(gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" | jq -sr '
              [ .[][]
                | select(.draft == false and .prerelease == true)
                | select(.tag_name | test("^v(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)-rnl\\.[1-9][0-9]*$"))
              ]
              | sort_by([(.published_at // .created_at // ""), (.id // 0)])
              | last
              | .tag_name // empty
            ')"
            [ "$newest_preview" = "$RELEASE_TAG" ] || {
              echo "refusing to reconcile $RELEASE_TAG; newest published preview is ${newest_preview:-<none>}" >&2
              exit 1
            }
          fi

          printf 'digest=%s\n' "$exact_digest" >>"$GITHUB_OUTPUT"

      - name: Reconcile the published release channel
        env:
          CHANNEL: ${{ steps.release-metadata.outputs.channel }}
          GH_TOKEN: ${{ github.token }}
          MAKE_LATEST: ${{ steps.release-metadata.outputs.make_latest }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_DIGEST: ${{ steps.release-image.outputs.digest }}
        run: |
          set -euo pipefail
          bash scripts/verify-release-latest.sh "$RELEASE_TAG" "$MAKE_LATEST"
          bash scripts/promote-image-tag.sh mutable \
            "${REGISTRY}/${IMAGE_NAME}" "$SOURCE_DIGEST" "$CHANNEL"
