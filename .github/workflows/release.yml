name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact X.Y.Z or X.Y.Z-rnl.N source version on main
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  verify-candidate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      attestations: read
      contents: read
      packages: read
    outputs:
      candidate_digest: ${{ steps.image.outputs.digest }}
      candidate_run_id: ${{ steps.runs.outputs.candidate_run_id }}
      channel: ${{ steps.metadata.outputs.channel }}
      make_latest: ${{ steps.metadata.outputs.make_latest }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Resolve the release request
        id: metadata
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: go run ./cmd/release-tool metadata --version "$VERSION_INPUT" >>"$GITHUB_OUTPUT"

      - name: Verify release source metadata
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        run: bash scripts/check-release-metadata.sh "$RELEASE_TAG"

      - name: Require the current main commit
        run: bash scripts/require-current-main.sh "$GITHUB_SHA"

      - name: Locate successful source workflows
        id: runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ci_run_id="$(bash scripts/find-workflow-run.sh ci.yml "$GITHUB_SHA")"
          candidate_run_id="$(bash scripts/find-workflow-run.sh container.yml "$GITHUB_SHA")"
          echo "verified ci run ${ci_run_id}"
          echo "candidate_run_id=${candidate_run_id}" >>"$GITHUB_OUTPUT"

      - name: Download the accepted release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-${{ github.sha }}
          path: dist/release
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.runs.outputs.candidate_run_id }}

      - name: Verify the release package
        run: >-
          go run ./cmd/release-tool verify-package
          --directory dist/release
          --source-revision "$GITHUB_SHA"
          --require-release-index

      - name: Verify release asset provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-release-asset-attestations.sh dist/release "$GITHUB_SHA"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - name: Verify image identity and provenance
        id: image
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-candidate-image.sh >>"$GITHUB_OUTPUT"

      - name: Bind the Release package to the accepted OCI index
        env:
          CANDIDATE_DIGEST: ${{ steps.image.outputs.digest }}
        run: >-
          go run ./cmd/release-tool verify-release-index
          --file dist/release/release-index.json
          --tag "${{ steps.metadata.outputs.tag }}"
          --image "$IMAGE"
          --source-revision "$GITHUB_SHA"
          --index-digest "$CANDIDATE_DIGEST"

  reject-invalid-ref:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: |
          echo "releases may only be dispatched from main" >&2
          exit 1

  publish:
    needs: verify-candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    environment: release
    permissions:
      actions: read
      attestations: read
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Download the verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-${{ github.sha }}
          path: dist/release
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.verify-candidate.outputs.candidate_run_id }}

      - name: Reverify the transferred package
        run: >-
          go run ./cmd/release-tool verify-package
          --directory dist/release
          --source-revision "$GITHUB_SHA"
          --require-release-index

      - name: Reconfirm the accepted OCI index binding
        env:
          CANDIDATE_DIGEST: ${{ needs.verify-candidate.outputs.candidate_digest }}
          RELEASE_TAG: ${{ needs.verify-candidate.outputs.tag }}
        run: >-
          go run ./cmd/release-tool verify-release-index
          --file dist/release/release-index.json
          --tag "$RELEASE_TAG"
          --image "$IMAGE"
          --source-revision "$GITHUB_SHA"
          --index-digest "$CANDIDATE_DIGEST"

      - name: Require current main before creating a draft
        run: bash scripts/require-current-main.sh "$GITHUB_SHA"

      - name: Inspect existing Release state
        id: release-state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.verify-candidate.outputs.tag }}
          PRERELEASE: ${{ needs.verify-candidate.outputs.prerelease }}
        run: bash scripts/release-state.sh "$RELEASE_TAG" "$GITHUB_SHA" "$PRERELEASE" >>"$GITHUB_OUTPUT"

      - name: Create or update the draft Release
        id: draft
        if: >-
          steps.release-state.outputs.state == 'absent' ||
          steps.release-state.outputs.state == 'draft'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          tag_name: ${{ needs.verify-candidate.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.verify-candidate.outputs.prerelease }}
          make_latest: false
          # The action appends generated notes when updating an existing draft.
          # Generate them once, then preserve the reviewed draft body on retries.
          generate_release_notes: ${{ steps.release-state.outputs.state == 'absent' }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/release/install.sh
            dist/release/remnanode-lite_${{ needs.verify-candidate.outputs.version }}_linux_amd64.tar.gz
            dist/release/remnanode-lite_${{ needs.verify-candidate.outputs.version }}_linux_arm64.tar.gz
            dist/release/compose.yaml
            dist/release/docker-compose.single-file.yaml
            dist/release/remnanode-lite.env.example
            dist/release/release-index.json
            dist/release/SHA256SUMS

      - name: Verify the draft Release
        if: >-
          steps.release-state.outputs.state == 'absent' ||
          steps.release-state.outputs.state == 'draft'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft.outputs.id }}
          RELEASE_TAG: ${{ needs.verify-candidate.outputs.tag }}
          PRERELEASE: ${{ needs.verify-candidate.outputs.prerelease }}
        run: bash scripts/verify-draft-release.sh "$RELEASE_ID" "$RELEASE_TAG" "$GITHUB_SHA" "$PRERELEASE" dist/release

      - name: Select the Release ID
        id: release
        env:
          DRAFT_RELEASE_ID: ${{ steps.draft.outputs.id }}
          EXISTING_RELEASE_ID: ${{ steps.release-state.outputs.release_id }}
        run: |
          release_id="${DRAFT_RELEASE_ID:-$EXISTING_RELEASE_ID}"
          printf '%s\n' "$release_id" | grep -Eq '^[1-9][0-9]*$'
          echo "id=$release_id" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reconfirm the source and tag before publication
        if: >-
          steps.release-state.outputs.state == 'absent' ||
          steps.release-state.outputs.state == 'draft'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.verify-candidate.outputs.tag }}
        run: |
          bash scripts/require-current-main.sh "$GITHUB_SHA"
          bash scripts/verify-release-tag.sh --require-missing "$RELEASE_TAG" "$GITHUB_SHA"

      - name: Promote the exact image tag before publication
        if: >-
          steps.release-state.outputs.state == 'absent' ||
          steps.release-state.outputs.state == 'draft'
        env:
          SOURCE_DIGEST: ${{ needs.verify-candidate.outputs.candidate_digest }}
          VERSION: ${{ needs.verify-candidate.outputs.version }}
        run: bash scripts/promote-image-tag.sh immutable "$IMAGE" "$SOURCE_DIGEST" "$VERSION"

      - name: Publish the draft Release
        if: >-
          steps.release-state.outputs.state == 'absent' ||
          steps.release-state.outputs.state == 'draft'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.verify-candidate.outputs.tag }}
          PRERELEASE: ${{ needs.verify-candidate.outputs.prerelease }}
          MAKE_LATEST: ${{ needs.verify-candidate.outputs.make_latest }}
        run: >-
          gh release edit "$RELEASE_TAG"
          --repo "$GITHUB_REPOSITORY"
          --target "$GITHUB_SHA"
          --draft=false
          --prerelease="$PRERELEASE"
          --latest="$MAKE_LATEST"

      - name: Verify the immutable Release and every asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.release.outputs.id }}
          RELEASE_TAG: ${{ needs.verify-candidate.outputs.tag }}
          PRERELEASE: ${{ needs.verify-candidate.outputs.prerelease }}
          MAKE_LATEST: ${{ needs.verify-candidate.outputs.make_latest }}
        run: bash scripts/verify-published-release.sh "$RELEASE_ID" "$RELEASE_TAG" "$GITHUB_SHA" "$PRERELEASE" "$MAKE_LATEST" dist/release

      - name: Confirm the exact image tag after Release verification
        env:
          SOURCE_DIGEST: ${{ needs.verify-candidate.outputs.candidate_digest }}
          VERSION: ${{ needs.verify-candidate.outputs.version }}
        run: bash scripts/promote-image-tag.sh immutable "$IMAGE" "$SOURCE_DIGEST" "$VERSION"

      - name: Require ownership of the moving channel
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.verify-candidate.outputs.tag }}
          PRERELEASE: ${{ needs.verify-candidate.outputs.prerelease }}
        run: bash scripts/require-channel-owner.sh "$RELEASE_TAG" "$PRERELEASE"

      - name: Promote the published channel without rebuilding
        env:
          CHANNEL: ${{ needs.verify-candidate.outputs.channel }}
          SOURCE_DIGEST: ${{ needs.verify-candidate.outputs.candidate_digest }}
        run: bash scripts/promote-image-tag.sh mutable "$IMAGE" "$SOURCE_DIGEST" "$CHANNEL"
