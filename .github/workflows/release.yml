name: release

env:
  ASN_SOURCE_URL: https://github.com/ipverse/as-ip-blocks/archive/56d021c7536afb15317155e45b57e7b5c87a4700.tar.gz
  ASN_SOURCE_SHA256: fc8be15bfbef3134f603276a26364935dbd2543d099dbaafa978a33b674a58ec
  REGISTRY: ghcr.io
  IMAGE_NAME: luxiaba/remnanode-lite

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: write
      packages: read
      attestations: read
    outputs:
      candidate_commit: ${{ steps.accepted-image.outputs.commit }}
      candidate_digest: ${{ steps.accepted-image.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release commit is the current main head
        run: |
          set -euo pipefail
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          main_head="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$main_head" ]; then
            echo "release commit $GITHUB_SHA is not current origin/main head $main_head" >&2
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: remnawave/node
          ref: 596f015a5c8f876dc9a9d61b6cb78d35bd8e379b
          path: .official-source
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"

      - name: Install pinned static checks
        run: bash scripts/install-ci-checks.sh

      - name: Release preflight
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          REQUIRE_GOVULNCHECK: "1"
          REQUIRE_TAG_AT_HEAD: "1"
          REMNANODE_OFFICIAL_SOURCE: ${{ github.workspace }}/.official-source
        run: bash scripts/release-check.sh

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify accepted candidate image
        id: accepted-image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          manifest="docs/development/acceptance/v${version}/manifest.json"
          candidate_commit="$(jq -r '.candidateCommit // empty' "$manifest")"
          candidate_digest="$(jq -r '.candidateImageDigest // empty' "$manifest")"
          printf '%s\n' "$candidate_commit" | grep -Eq '^[0-9a-f]{40}$'
          printf '%s\n' "$candidate_digest" | grep -Eq '^sha256:[0-9a-f]{64}$'

          image="${REGISTRY}/${IMAGE_NAME}"
          candidate_ref="${image}@${candidate_digest}"
          resolved="$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "$candidate_ref" | tr -d '\r\n')"
          if [ "$resolved" != "$candidate_digest" ]; then
            echo "$candidate_ref resolved to $resolved, acceptance requires $candidate_digest" >&2
            exit 1
          fi

          gh attestation verify "oci://${image}@${candidate_digest}" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/container.yml" \
            --source-digest "$candidate_commit" \
            --source-ref refs/heads/main \
            --deny-self-hosted-runners

          printf 'commit=%s\n' "$candidate_commit" >> "$GITHUB_OUTPUT"
          printf 'digest=%s\n' "$candidate_digest" >> "$GITHUB_OUTPUT"

      - name: Network administration integration in isolated namespaces
        run: |
          sudo apt-get update
          sudo apt-get install --yes iproute2 nftables
          sudo env "PATH=$PATH" REMNANODE_NFT_INTEGRATION=1 \
            go test ./internal/plugin -run '^TestNFTManagerInNetworkNamespace$' -count=1 -v
          sudo env "PATH=$PATH" REMNANODE_SOCKET_KILL_INTEGRATION=1 \
            go test ./internal/netadmin -run '^TestKillSocketsInNetworkNamespace$' -count=1 -v

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          mkdir -p dist/binaries
          bash scripts/build-release-binaries.sh dist/binaries

          host_arch="$(uname -m)"
          for arch in amd64 arm64; do
            out_dir="$(mktemp -d)"
            install -m 0755 "dist/binaries/remnanode-lite_linux_${arch}" "${out_dir}/remnanode-lite"

            # amd64 runner cannot execute arm64 binaries (Exec format error)
            case "${arch}:${host_arch}" in
              amd64:x86_64|arm64:aarch64|arm64:arm64)
                "${out_dir}/remnanode-lite" version
                ;;
              *)
                file "${out_dir}/remnanode-lite"
                ;;
            esac

            printf '%s\n' \
              "remnanode-lite ${GITHUB_REF_NAME} linux/${arch}" \
              "" \
              "Extract and install to /usr/local/bin/remnanode-lite" \
              > "${out_dir}/README.txt"

            mkdir -p "${out_dir}/support/deploy" "${out_dir}/support/scripts"
            install -m 0644 deploy/remnawave-node.service "${out_dir}/support/deploy/"
            install -m 0755 deploy/remnawave-node.openrc "${out_dir}/support/deploy/"
            install -m 0644 scripts/install-env-helpers.sh "${out_dir}/support/scripts/"
            install -m 0755 \
              scripts/install-xray.sh \
              scripts/upgrade.sh \
              scripts/uninstall.sh \
              "${out_dir}/support/scripts/"

            tar -C "${out_dir}" -czf "dist/remnanode-lite_linux_${arch}.tar.gz" \
              remnanode-lite README.txt support
            rm -rf "${out_dir}"
          done
          rm -rf dist/binaries

          install -m 0644 compose.yaml dist/compose.yaml
          install -m 0644 deploy/compose.single-file.yaml dist/docker-compose.single-file.yaml
          release_version="${GITHUB_REF_NAME#v}"
          sed -i \
            "s|ghcr.io/luxiaba/remnanode-lite:latest|ghcr.io/luxiaba/remnanode-lite:${release_version}|" \
            dist/docker-compose.single-file.yaml
          install -m 0644 .env.example dist/remnanode.env.example

          curl --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 --retry 3 --retry-all-errors \
            "${ASN_SOURCE_URL}" -o /tmp/as-ip-blocks.tar.gz
          printf '%s  %s\n' "${ASN_SOURCE_SHA256}" /tmp/as-ip-blocks.tar.gz | sha256sum --check --strict
          go run ./cmd/asn-builder \
            -format ipverse-tar-gz \
            -in /tmp/as-ip-blocks.tar.gz \
            -out dist/asn-prefixes.bin
          rm -f /tmp/as-ip-blocks.tar.gz

          cd dist
          sha256sum \
            remnanode-lite_linux_amd64.tar.gz \
            remnanode-lite_linux_arm64.tar.gz \
            asn-prefixes.bin \
            compose.yaml \
            docker-compose.single-file.yaml \
            remnanode.env.example \
            > SHA256SUMS

      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          fail_on_unmatched_files: true
          make_latest: false
          overwrite_files: false
          prerelease: false
          files: |
            dist/remnanode-lite_linux_amd64.tar.gz
            dist/remnanode-lite_linux_arm64.tar.gz
            dist/asn-prefixes.bin
            dist/compose.yaml
            dist/docker-compose.single-file.yaml
            dist/remnanode.env.example
            dist/SHA256SUMS

  publish-container:
    needs: release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.release-image.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish accepted candidate as the exact release version
        id: release-image
        env:
          SOURCE_DIGEST: ${{ needs.release.outputs.candidate_digest }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          bash scripts/promote-image-tag.sh immutable \
            "${REGISTRY}/${IMAGE_NAME}" "$SOURCE_DIGEST" "$version"
          printf 'digest=%s\n' "$SOURCE_DIGEST" >> "$GITHUB_OUTPUT"

  promote-latest:
    needs: publish-container
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Revalidate main head before latest promotion
        run: |
          set -euo pipefail
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          main_head="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$main_head" ]; then
            echo "refusing to move latest from stale release $GITHUB_SHA; current main is $main_head" >&2
            exit 1
          fi

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote attested image to GHCR latest
        env:
          SOURCE_DIGEST: ${{ needs.publish-container.outputs.digest }}
        run: |
          set -euo pipefail
          bash scripts/promote-image-tag.sh mutable \
            "${REGISTRY}/${IMAGE_NAME}" "$SOURCE_DIGEST" latest

      - name: Mark GitHub release as latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq .id)"
          printf '%s\n' "$release_id" | grep -Eq '^[1-9][0-9]*$'
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -f make_latest=true >/dev/null
