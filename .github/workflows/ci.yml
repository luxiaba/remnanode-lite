name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: remnawave/node
          ref: 596f015a5c8f876dc9a9d61b6cb78d35bd8e379b
          path: .official-source
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Verify pinned official source oracle
        env:
          REMNANODE_OFFICIAL_SOURCE: ${{ github.workspace }}/.official-source
        run: go run ./cmd/contract-source-check

      - name: Go quality and tests
        run: bash scripts/check-go.sh

  repository:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install pinned static checks
        run: bash scripts/install-ci-checks.sh

      - name: Repository, packaging, and build checks
        env:
          REMNANODE_DOCS_STRICT_TRANSLATIONS: "1"
          REQUIRE_GOVULNCHECK: "1"
        run: bash scripts/check-repository.sh

  native:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Offline Native bootstrap tests
        run: sh release/native/install_test.sh

      - name: Validate the shared runtime asset lock
        run: go run ./cmd/release-tool validate --lock release/runtime-assets.lock.json

  netadmin:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install network administration dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes iproute2 nftables

      - name: Network administration in isolated namespaces
        run: |
          sudo env "PATH=$PATH" REMNANODE_NFT_INTEGRATION=1 \
            go test ./internal/plugin -run '^TestNFTManagerInNetworkNamespace$' -count=1 -v
          sudo env "PATH=$PATH" REMNANODE_SOCKET_KILL_INTEGRATION=1 \
            go test ./internal/netadmin -run '^TestKillSocketsInNetworkNamespace$' -count=1 -v

  gate:
    if: ${{ always() }}
    needs: [go, repository, native, netadmin]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GO_RESULT: ${{ needs.go.result }}
      REPOSITORY_RESULT: ${{ needs.repository.result }}
      NATIVE_RESULT: ${{ needs.native.result }}
      NETADMIN_RESULT: ${{ needs.netadmin.result }}
    steps:
      - name: Require every CI job to pass
        run: |
          set -euo pipefail
          for result in \
            "$GO_RESULT" \
            "$REPOSITORY_RESULT" \
            "$NATIVE_RESULT" \
            "$NETADMIN_RESULT"; do
            if [ "$result" != success ]; then
              echo "required CI job finished with result: $result" >&2
              exit 1
            fi
          done
