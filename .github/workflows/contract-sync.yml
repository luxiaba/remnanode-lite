name: contract-sync

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

env:
  OFFICIAL_NODE_REF: "2.8.0"
  OFFICIAL_NODE_COMMIT: "596f015a5c8f876dc9a9d61b6cb78d35bd8e379b"

permissions:
  contents: read

jobs:
  watch-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Open an issue when the official Node release changes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pinned_version="$(tr -d ' \n\r' < internal/version/contract.version)"
          latest_version="$(gh api repos/remnawave/node/releases/latest --jq .tag_name)"
          if ! [[ "$latest_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "official Node returned an invalid release tag: $latest_version" >&2
            exit 1
          fi
          if [ "$latest_version" = "$pinned_version" ]; then
            echo "official Node remains at $pinned_version"
            exit 0
          fi

          title="chore: sync official Node ${latest_version}"
          existing="$(gh issue list --state open --limit 100 --json title --jq \
            ".[] | select(.title == \"${title}\") | .title")"
          if [ -n "$existing" ]; then
            echo "sync issue already exists: $title"
            exit 0
          fi

          gh issue create \
            --title "$title" \
            --body "Official remnawave/node released ${latest_version}; the current compatibility baseline is ${pinned_version}. Update the pinned source commit, contract evidence, implementation, tests, and acceptance scope before changing ContractVersion. Choose the project Version independently according to docs/versioning.md."

  compare-routes:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Clone pinned official Remnawave Node
        run: |
          git clone --depth 1 --branch "$OFFICIAL_NODE_REF" \
            https://github.com/remnawave/node.git /tmp/remnawave-node
          actual_commit="$(git -C /tmp/remnawave-node rev-parse HEAD)"
          if [ "$actual_commit" != "$OFFICIAL_NODE_COMMIT" ]; then
            echo "::error::official Node ref resolved to $actual_commit, expected $OFFICIAL_NODE_COMMIT"
            exit 1
          fi

      - name: Verify pinned contract version
        id: official
        run: |
          official_version="$(jq -r '.version' /tmp/remnawave-node/package.json)"
          local_version="$(tr -d ' \n\r' < internal/version/contract.version)"
          if [ "$official_version" != "$local_version" ]; then
            echo "::error::contract.version ($local_version) != official Node ($official_version)"
            exit 1
          fi
          echo "version=$official_version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Verify pinned official source oracle
        run: go run ./cmd/contract-source-check
        env:
          REMNANODE_OFFICIAL_SOURCE: /tmp/remnawave-node
