name: contract-sync

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

env:
  OFFICIAL_NODE_COMMIT: "596f015a5c8f876dc9a9d61b6cb78d35bd8e379b"

permissions:
  contents: read

concurrency:
  group: contract-sync
  cancel-in-progress: false

jobs:
  watch-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Open an issue when the official Node release changes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: bash scripts/watch-official-release.sh

  compare-routes:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: remnawave/node
          ref: ${{ env.OFFICIAL_NODE_COMMIT }}
          path: .official-source
          persist-credentials: false

      - name: Verify pinned contract version
        id: official
        run: |
          official_version="$(jq -r '.version' .official-source/package.json)"
          local_version="$(tr -d ' \n\r' < internal/version/contract.version)"
          if [ "$official_version" != "$local_version" ]; then
            echo "::error::contract.version ($local_version) != official Node ($official_version)"
            exit 1
          fi
          echo "version=$official_version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Verify pinned official source oracle
        run: go run ./cmd/contract-source-check
        env:
          REMNANODE_OFFICIAL_SOURCE: ${{ github.workspace }}/.official-source
