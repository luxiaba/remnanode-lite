name: container

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: luxiaba/remnanode-lite

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
    paths:
      - ".github/workflows/container.yml"
      - ".dockerignore"
      - ".env.example"
      - "Dockerfile"
      - "compose.yaml"
      - "deploy/compose.single-file.yaml"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "scripts/promote-image-tag.sh"

concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - name: Build linux/amd64 image without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          pull: true
          push: false
          outputs: type=cacheonly
          cache-from: type=gha,scope=container-ci
          cache-to: type=gha,mode=max,scope=container-ci

  publish-main:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: docker.io/tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read project version
        id: project-version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^var Version = "\([^"]*\)"$/\1/p' internal/version/version.go)"
          printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-rnl\.[1-9][0-9]*)?$' || {
            echo "invalid project version: $version" >&2
            exit 1
          }
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Build and publish untagged main image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.title=Remnanode Lite
            org.opencontainers.image.description=Low-memory Remnawave Node compatible implementation
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.project-version.outputs.version }}
            org.opencontainers.image.licenses=AGPL-3.0-only
          cache-from: type=gha,scope=container-main
          cache-to: type=gha,mode=max,scope=container-main
          provenance: mode=max
          sbom: generator=docker.io/docker/buildkit-syft-scanner:stable-1@sha256:79e7b013cbec16bbb436f312819a49a4a57752b2270c1a9332ae1a10fcc82a68

  reject-invalid-dispatch:
    if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Reject non-main candidate dispatch
        run: |
          echo "candidate publishing is only allowed from refs/heads/main" >&2
          exit 1

  attest-main:
    needs: publish-main
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate main manifest digest
        id: digest
        env:
          SOURCE_DIGEST: ${{ needs.publish-main.outputs.digest }}
        run: |
          set -euo pipefail
          printf '%s\n' "$SOURCE_DIGEST" | grep -Eq '^sha256:[0-9a-f]{64}$' || {
            echo "main image did not return a manifest digest: $SOURCE_DIGEST" >&2
            exit 1
          }
          printf 'digest=%s\n' "$SOURCE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Attest main image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  promote-main:
    needs: [publish-main, attest-main]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish immutable candidate tag
        id: candidate
        env:
          SOURCE_DIGEST: ${{ needs.publish-main.outputs.digest }}
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          tag="sha-${GITHUB_SHA}"
          candidate_ref="${image}:${tag}"
          candidate_digest="$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "$candidate_ref" 2>/dev/null | tr -d '\r\n' || true)"
          if [ -n "$candidate_digest" ]; then
            printf '%s\n' "$candidate_digest" | grep -Eq '^sha256:[0-9a-f]{64}$' || {
              echo "$candidate_ref returned an invalid digest: $candidate_digest" >&2
              exit 1
            }
            echo "$candidate_ref already exists at $candidate_digest; keeping the immutable candidate"
          else
            bash scripts/promote-image-tag.sh immutable "$image" "$SOURCE_DIGEST" "$tag"
            candidate_digest="$SOURCE_DIGEST"
          fi
          printf 'digest=%s\n' "$candidate_digest" >> "$GITHUB_OUTPUT"

      - name: Promote current main image to edge
        if: github.event_name == 'push'
        env:
          SOURCE_DIGEST: ${{ steps.candidate.outputs.digest }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          main_head="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$main_head" ]; then
            echo "skip edge promotion for stale main commit $GITHUB_SHA; current main is $main_head"
            exit 0
          fi
          bash scripts/promote-image-tag.sh mutable \
            "${REGISTRY}/${IMAGE_NAME}" "$SOURCE_DIGEST" edge
