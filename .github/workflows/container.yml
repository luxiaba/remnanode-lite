name: candidate

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
    paths:
      - ".github/workflows/container.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "compose*.yaml"
      - ".env.example"
      - "deploy/**"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "release/**"
      - "scripts/**"

concurrency:
  group: candidate-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  container-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: docker.io/tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - name: Build both production platforms
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: false
          outputs: type=cacheonly
          cache-from: type=gha,scope=container-ci
          cache-to: type=gha,mode=max,scope=container-ci

  image:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.accepted.outputs.digest }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: docker.io/tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Resolve source release metadata
        id: version
        run: go run ./cmd/release-tool metadata >>"$GITHUB_OUTPUT"

      - name: Inspect the immutable candidate
        id: candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-candidate-image.sh --allow-missing >>"$GITHUB_OUTPUT"

      - name: Build immutable image content
        id: build
        if: steps.candidate.outputs.state == 'absent'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.title=Remnanode Lite
            org.opencontainers.image.description=Low-memory Remnawave Node compatible implementation
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=AGPL-3.0-only
          cache-from: type=gha,scope=container-main
          cache-to: type=gha,mode=max,scope=container-main
          provenance: mode=max
          sbom: generator=docker.io/docker/buildkit-syft-scanner:stable-1@sha256:79e7b013cbec16bbb436f312819a49a4a57752b2270c1a9332ae1a10fcc82a68

      - name: Attest the image index
        if: steps.candidate.outputs.state == 'absent'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Publish the immutable candidate reference
        if: steps.candidate.outputs.state == 'absent'
        env:
          SOURCE_DIGEST: ${{ steps.build.outputs.digest }}
        run: bash scripts/promote-image-tag.sh immutable "$IMAGE" "$SOURCE_DIGEST" "sha-$GITHUB_SHA"

      - name: Verify the accepted immutable candidate
        id: accepted
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-candidate-image.sh >>"$GITHUB_OUTPUT"

  native:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Resolve release metadata
        id: metadata
        run: go run ./cmd/release-tool metadata >>"$GITHUB_OUTPUT"

      - name: Verify release source metadata
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        run: bash scripts/check-release-metadata.sh "$RELEASE_TAG"

      - name: Build deterministic Native bundles
        run: bash scripts/build-native-bundle.sh dist/native amd64 arm64

      - name: Assemble release assets
        run: go run ./cmd/release-tool assemble --native-dir dist/native --out-dir dist/release

      - name: Verify release assets
        run: go run ./cmd/release-tool verify-package --directory dist/release --source-revision "$GITHUB_SHA"

      - name: Smoke test Native bundles
        run: bash scripts/test-native-release-bundles.sh dist/release "${{ steps.metadata.outputs.version }}"

      - name: Attest every release asset
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/release/*

      - name: Preserve the release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ github.sha }}
          path: dist/release/*
          if-no-files-found: error
          compression-level: 0
          overwrite: true
          retention-days: 30

  promote-edge:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [image, native]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: registry-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Advance edge only after the complete candidate succeeds
        run: bash scripts/promote-candidate-edge.sh "$IMAGE" "${{ needs.image.outputs.digest }}" "$GITHUB_SHA"

  reject-invalid-dispatch:
    if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: |
          echo "candidate builds may only be dispatched from main" >&2
          exit 1
