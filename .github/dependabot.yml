version: 2

updates:
  - package-ecosystem: gomod
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    groups:
      go-modules:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "03:20"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "03:40"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    groups:
      container-images:
        patterns:
          - "*"
